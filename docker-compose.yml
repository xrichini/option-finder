services:
  api:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/daemon/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  daemon:
    build: .
    command: python scan_daemon.py --interval 15 --universe all
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
