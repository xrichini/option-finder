        // Mettre à jour les badges des filtres
        function updateFilterBadges() {
            if (!currentOptions || currentOptions.length === 0) {
                // Réinitialiser tous les badges à 0
                document.getElementById('badge-all').textContent = '0';
                document.getElementById('badge-high-score').textContent = '0';
                document.getElementById('badge-high-volume').textContent = '0';
                document.getElementById('badge-near-expiry').textContent = '0';
                document.getElementById('badge-calls').textContent       = '0';
                document.getElementById('badge-puts').textContent        = '0';
                document.getElementById('badge-unusual-vol').textContent = '0';
                document.getElementById('badge-high-iv').textContent     = '0';
                return;
            }
            
            // Calculer les seuils dynamiques
            const scores = currentOptions.map(opt => Number(opt.hybrid_score || opt.whale_score || opt.score || 0));
            const volumes = currentOptions.map(opt => Number(opt.volume || 0));
            const avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;
            const avgVolume = volumes.reduce((a,b)=>a+b,0) / volumes.length;
            const highScoreThreshold = Math.max(avgScore, 60);
            const highVolumeThreshold = Math.max(avgVolume, 500);
            
            // Compter les options pour chaque filtre
            const counts = {
                all: currentOptions.length,
                highScore: currentOptions.filter(opt => {
                    const score = Number(opt.hybrid_score || opt.whale_score || opt.score || 0);
                    return score >= highScoreThreshold;
                }).length,
                highVolume: currentOptions.filter(opt => {
                    const volume = Number(opt.volume || 0);
                    return volume >= highVolumeThreshold;
                }).length,
                nearExpiry: currentOptions.filter(opt => {
                    const dte = Number(opt.dte || opt.days_to_expiration || 0);
                    return dte <= 7;
                }).length
            };
            
            const voloiRatio = o => Number(o.vol_oi_ratio || (o.open_interest > 0 ? o.volume / o.open_interest : 0));
            let ivNorm = o => { let v = Number(o.implied_volatility || 0); if (v > 0 && v <= 1) v *= 100; return v; };

            counts.calls      = currentOptions.filter(o => (o.option_type||'').toUpperCase() === 'CALL').length;
            counts.puts       = currentOptions.filter(o => (o.option_type||'').toUpperCase() === 'PUT').length;
            counts.unusualVol = currentOptions.filter(o => voloiRatio(o) >= 5).length;
            counts.highIv     = currentOptions.filter(o => ivNorm(o) >= 60).length;

            // Mettre à jour les badges
            document.getElementById('badge-all').textContent = counts.all;
            document.getElementById('badge-high-score').textContent = counts.highScore;
            document.getElementById('badge-high-volume').textContent = counts.highVolume;
            document.getElementById('badge-near-expiry').textContent = counts.nearExpiry;
            document.getElementById('badge-calls').textContent      = counts.calls;
            document.getElementById('badge-puts').textContent       = counts.puts;
            document.getElementById('badge-unusual-vol').textContent = counts.unusualVol;
            document.getElementById('badge-high-iv').textContent    = counts.highIv;
        }


        function applyFilter(filterType) {
            console.log('Application du filtre:', filterType);
            
            if (!currentOptions || currentOptions.length === 0) {
                console.log('Aucune donnée à filtrer');
                return;
            }
            
            // Debug: Analyser les données disponibles
            console.log('🔍 ANALYSE DES DONNÉES POUR FILTRES:');
            const scores = currentOptions.map(opt => Number(opt.hybrid_score || opt.whale_score || opt.score || 0));
            const volumes = currentOptions.map(opt => Number(opt.volume || 0));
            const dtes = currentOptions.map(opt => Number(opt.dte || opt.days_to_expiration || 0));
            
            console.log(`📊 Scores: min=${Math.min(...scores)} max=${Math.max(...scores)} avg=${(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1)}`);
            console.log(`📈 Volumes: min=${Math.min(...volumes)} max=${Math.max(...volumes)} avg=${(volumes.reduce((a,b)=>a+b,0)/volumes.length).toFixed(0)}`);
            console.log(`📅 DTEs: min=${Math.min(...dtes)} max=${Math.max(...dtes)} avg=${(dtes.reduce((a,b)=>a+b,0)/dtes.length).toFixed(1)}`);
            
            // Calculer des seuils dynamiques
            const avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;
            const avgVolume = volumes.reduce((a,b)=>a+b,0) / volumes.length;
            const highScoreThreshold = Math.max(avgScore, 60); // Au minimum 60
            const highVolumeThreshold = Math.max(avgVolume, 500); // Au minimum 500
            
            switch (filterType) {
                case 'all':
                    filteredOptions = [...currentOptions];
                    break;
                    
                case 'high-score':
                    filteredOptions = currentOptions.filter(opt => {
                        const score = Number(opt.hybrid_score || opt.whale_score || opt.score || 0);
                        return score >= highScoreThreshold;
                    });
                    console.log(`🎯 Seuil score élevé: ${highScoreThreshold}`);
                    break;
                    
                case 'high-volume':
                    filteredOptions = currentOptions.filter(opt => {
                        const volume = Number(opt.volume || 0);
                        return volume >= highVolumeThreshold;
                    });
                    console.log(`🔊 Seuil volume élevé: ${highVolumeThreshold}`);
                    break;
                    
                case 'near-expiry':
                    filteredOptions = currentOptions.filter(opt => {
                        const dte = Number(opt.dte || opt.days_to_expiration || 0);
                        return dte <= 7;
                    });
                    break;

                case 'calls':
                    filteredOptions = currentOptions.filter(opt =>
                        (opt.option_type || '').toUpperCase() === 'CALL'
                    );
                    break;

                case 'puts':
                    filteredOptions = currentOptions.filter(opt =>
                        (opt.option_type || '').toUpperCase() === 'PUT'
                    );
                    break;

                case 'unusual-vol': {
                    filteredOptions = currentOptions.filter(opt => {
                        const ratio = Number(opt.vol_oi_ratio ||
                            (opt.open_interest > 0 ? opt.volume / opt.open_interest : 0));
                        return ratio >= 5;
                    });
                    break;
                }

                case 'high-iv': {
                    filteredOptions = currentOptions.filter(opt => {
                        let iv = Number(opt.implied_volatility || 0);
                        if (iv > 0 && iv <= 1) iv *= 100;
                        return iv >= 60;
                    });
                    break;
                }

                default:
                    filteredOptions = [...currentOptions];
            }
            
            // Ticker search overlay (stacks on top of any badge filter)
            if (tickerSearch) filteredOptions = filteredOptions.filter(
                o => (o.underlying_symbol || '').toUpperCase().startsWith(tickerSearch));

            console.log(`✅ Filtre ${filterType}: ${filteredOptions.length}/${currentOptions.length} options affichées`);
            
            // Debug: Montrer les options filtrées
            if (filteredOptions.length !== currentOptions.length) {
                console.log('🔍 Options filtrées:');
                filteredOptions.forEach(opt => {
                    const symbol = opt.symbol || opt.option_symbol;
                    const score = Number(opt.hybrid_score || opt.whale_score || opt.score || 0);
                    const volume = Number(opt.volume || 0);
                    const dte = Number(opt.dte || opt.days_to_expiration || 0);
                    console.log(`  - ${symbol}: Score=${score} Volume=${volume} DTE=${dte}`);
                });
            }
            
            renderOptions();
        }
