<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐋 Options Screener - Interface Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1d29;
            color: #ffffff;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            border-radius: 12px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4299e1, #63b3ed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.9rem;
            color: #a0aec0;
            margin-bottom: 5px;
        }

        .input-group input, .input-group select {
            padding: 10px;
            border: 1px solid #4a5568;
            border-radius: 8px;
            background: #2d3748;
            color: white;
            font-size: 0.9rem;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(66, 153, 225, 0.3);
        }

        .results-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: #2d3748;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid #4299e1;
        }

        .summary-card .number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .summary-card .label {
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Styles pour CALL (Bullish - Vert) */
        .option-card.call {
            background: linear-gradient(135deg, #1a2e1a 0%, #0f1b0f 100%);
            border: 1px solid #38a169;
            border-left: 6px solid #38a169;
            position: relative;
        }

        .option-card.call::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: linear-gradient(180deg, #48bb78, #38a169);
        }

        .option-card.call .option-type {
            background: linear-gradient(135deg, #38a169, #48bb78);
            color: white;
        }

        /* Styles pour PUT (Bearish - Rouge) */
        .option-card.put {
            background: linear-gradient(135deg, #2e1a1a 0%, #1b0f0f 100%);
            border: 1px solid #e53e3e;
            border-left: 6px solid #e53e3e;
            position: relative;
        }

        .option-card.put::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: linear-gradient(180deg, #fc8181, #e53e3e);
        }

        .option-card.put .option-type {
            background: linear-gradient(135deg, #e53e3e, #fc8181);
            color: white;
        }

        .option-card {
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .option-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .option-header {
            display: flex;
            justify-content: between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .option-info {
            flex: 1;
        }

        .option-symbol {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }

        .underlying {
            color: #a0aec0;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .option-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .score-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .option-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .metric {
            text-align: center;
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .metric-label {
            font-size: 0.8rem;
            color: #a0aec0;
            text-transform: uppercase;
        }

        .option-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-item {
            text-align: center;
            font-size: 0.8rem;
        }

        .detail-value {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .detail-label {
            color: #a0aec0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #2d3748;
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .close-modal {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-sections {
            display: grid;
            gap: 20px;
        }

        .modal-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4299e1;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .metric-card {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .metric-card .value {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .metric-card .label {
            font-size: 0.8rem;
            color: #a0aec0;
            text-transform: uppercase;
        }

        .moneyness-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-top: 10px;
        }

        .moneyness-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .moneyness-dot.itm { background: #38a169; }
        .moneyness-dot.otm { background: #e53e3e; }
        .moneyness-dot.atm { background: #4299e1; }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #4a5568;
            background: transparent;
            color: #a0aec0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #4299e1;
            color: white;
            border-color: #4299e1;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }

        .loading-spinner {
            border: 3px solid #4a5568;
            border-top: 3px solid #4299e1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .trend-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .trend-indicator.bullish {
            background: rgba(56, 161, 105, 0.2);
            color: #48bb78;
        }

        .trend-indicator.bearish {
            background: rgba(229, 62, 62, 0.2);
            color: #fc8181;
        }

        .trend-indicator.neutral {
            background: rgba(66, 153, 225, 0.2);
            color: #63b3ed;
        }

        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .option-details {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐋 Options Whale Screener</h1>
            <p>Analyse hybride temps réel avec classification visuelle Call/Put</p>
        </div>

        <div class="controls">
            <div class="input-group">
                <label>Symboles (séparés par virgule)</label>
                <input type="text" id="symbols" placeholder="AAPL,TSLA,SPY,QQQ" value="AAPL,TSLA,SPY,QQQ">
            </div>
            
            <div class="input-group">
                <label>DTE Max</label>
                <input type="number" id="max-dte" value="21" min="1" max="90">
            </div>
            
            <div class="input-group">
                <label>Volume Min</label>
                <input type="number" id="min-volume" value="50" min="1">
            </div>
            
            <div class="input-group">
                <label>Score Min</label>
                <input type="number" id="min-score" value="50" min="0" max="100" step="0.1">
            </div>
            
            <button class="btn btn-primary" onclick="scanOptions()">🔍 Scanner Options</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tout</button>
            <button class="filter-btn" data-filter="call">📈 CALLS</button>
            <button class="filter-btn" data-filter="put">📉 PUTS</button>
            <button class="filter-btn" data-filter="high-score">Score > 70</button>
            <button class="filter-btn" data-filter="high-volume">Volume > 1000</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="loading-spinner"></div>
            <p>Scanning en cours... Analyse hybride Tradier + Polygon.io</p>
        </div>

        <div id="results-summary" class="results-summary" style="display: none;"></div>
        
        <div id="options-container" class="options-grid"></div>
    </div>

    <!-- Modal pour détails option -->
    <div id="option-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title"></h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            
            <div class="modal-sections" id="modal-sections"></div>
        </div>
    </div>

    <script>
        let currentData = [];
        let filteredData = [];

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            setupFilterButtons();
            // Auto-scan au chargement avec symboles par défaut
            setTimeout(scanOptions, 500);
        });

        function setupFilterButtons() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    applyFilter(this.dataset.filter);
                });
            });
        }

        async function scanOptions() {
            const symbols = document.getElementById('symbols').value.split(',').map(s => s.trim().toUpperCase()).filter(s => s);
            const maxDte = parseInt(document.getElementById('max-dte').value);
            const minVolume = parseInt(document.getElementById('min-volume').value);
            const minScore = parseFloat(document.getElementById('min-score').value);

            if (symbols.length === 0) {
                alert('Veuillez saisir au moins un symbole');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch('/api/hybrid/scan-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbols: symbols,
                        max_dte: maxDte,
                        min_volume: minVolume,
                        min_whale_score: minScore
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    currentData = data.results.all_opportunities;
                    displayResults(data);
                } else {
                    throw new Error(data.error || 'Erreur de scanning');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors du scanning: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('results-summary').style.display = show ? 'none' : 'block';
        }

        function displayResults(data) {
            displaySummary(data.results.statistics);
            filteredData = currentData;
            renderOptions(filteredData);
        }

        function displaySummary(stats) {
            const summaryHtml = `
                <div class="summary-card">
                    <div class="number">${stats.calls.count + stats.puts.count}</div>
                    <div class="label">Total Opportunités</div>
                </div>
                <div class="summary-card" style="border-left-color: #38a169;">
                    <div class="number" style="color: #38a169;">${stats.calls.count}</div>
                    <div class="label">📈 CALLS</div>
                </div>
                <div class="summary-card" style="border-left-color: #e53e3e;">
                    <div class="number" style="color: #e53e3e;">${stats.puts.count}</div>
                    <div class="label">📉 PUTS</div>
                </div>
                <div class="summary-card">
                    <div class="number">${stats.calls.avg_hybrid_score.toFixed(1)}</div>
                    <div class="label">Score Moyen CALLS</div>
                </div>
                <div class="summary-card">
                    <div class="number">${stats.puts.avg_hybrid_score.toFixed(1)}</div>
                    <div class="label">Score Moyen PUTS</div>
                </div>
            `;
            document.getElementById('results-summary').innerHTML = summaryHtml;
        }

        function renderOptions(options) {
            const container = document.getElementById('options-container');
            
            if (options.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #a0aec0; padding: 40px;">Aucune opportunité trouvée avec ces critères</div>';
                return;
            }

            const html = options.map(option => {
                const isCall = option.option_type === 'CALL';
                const cardClass = isCall ? 'call' : 'put';
                const emoji = isCall ? '📈' : '📉';
                
                return `
                    <div class="option-card ${cardClass}" onclick="showOptionDetails('${option.option_symbol}')">
                        <div class="score-badge">${option.hybrid_score.toFixed(1)}</div>
                        
                        <div class="option-header">
                            <div class="option-info">
                                <div class="option-symbol">${option.option_symbol}</div>
                                <div class="underlying">${option.underlying_symbol}</div>
                                <span class="option-type">${emoji} ${option.option_type}</span>
                                ${option.price_trend_30d ? `<span class="trend-indicator ${option.price_trend_30d}">${getTrendEmoji(option.price_trend_30d)} ${option.price_trend_30d.toUpperCase()}</span>` : ''}
                            </div>
                        </div>

                        <div class="option-metrics">
                            <div class="metric">
                                <div class="metric-value">$${option.last.toFixed(2)}</div>
                                <div class="metric-label">Prix</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${option.volume.toLocaleString()}</div>
                                <div class="metric-label">Volume</div>
                            </div>
                        </div>

                        <div class="option-details">
                            <div class="detail-item">
                                <div class="detail-value">$${option.strike}</div>
                                <div class="detail-label">Strike</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-value">${option.dte}j</div>
                                <div class="detail-label">DTE</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-value">${option.open_interest.toLocaleString()}</div>
                                <div class="detail-label">OI</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-value">${option.volume_anomaly_ratio ? (option.volume_anomaly_ratio * 100).toFixed(0) + 'x' : 'N/A'}</div>
                                <div class="detail-label">Anomalie</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        function getTrendEmoji(trend) {
            switch(trend) {
                case 'bullish': return '🔥';
                case 'bearish': return '❄️';
                default: return '➡️';
            }
        }

        function applyFilter(filter) {
            switch(filter) {
                case 'all':
                    filteredData = currentData;
                    break;
                case 'call':
                    filteredData = currentData.filter(opt => opt.option_type === 'CALL');
                    break;
                case 'put':
                    filteredData = currentData.filter(opt => opt.option_type === 'PUT');
                    break;
                case 'high-score':
                    filteredData = currentData.filter(opt => opt.hybrid_score > 70);
                    break;
                case 'high-volume':
                    filteredData = currentData.filter(opt => opt.volume > 1000);
                    break;
            }
            renderOptions(filteredData);
        }

        function showOptionDetails(optionSymbol) {
            const option = currentData.find(opt => opt.option_symbol === optionSymbol);
            if (!option) return;

            const modal = document.getElementById('option-modal');
            const title = document.getElementById('modal-title');
            const sections = document.getElementById('modal-sections');

            title.textContent = option.option_symbol;

            // Calculer la moneyness
            const underlyingPrice = option.underlying_price || option.strike; // Utilise le prix réel ou fallback strike
            const strike = option.strike;
            const isCall = option.option_type === 'CALL';
            
            let moneyness, moneynessClass;
            if (isCall) {
                if (underlyingPrice > strike * 1.05) { moneyness = 'In-The-Money'; moneynessClass = 'itm'; }
                else if (underlyingPrice < strike * 0.95) { moneyness = 'Out-The-Money'; moneynessClass = 'otm'; }
                else { moneyness = 'At-The-Money'; moneynessClass = 'atm'; }
            } else {
                if (underlyingPrice < strike * 0.95) { moneyness = 'In-The-Money'; moneynessClass = 'itm'; }
                else if (underlyingPrice > strike * 1.05) { moneyness = 'Out-The-Money'; moneynessClass = 'otm'; }
                else { moneyness = 'At-The-Money'; moneynessClass = 'atm'; }
            }

            sections.innerHTML = `
                <div class="modal-section">
                    <h4 class="section-title">📊 Métriques Principales</h4>
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="value">$${option.last.toFixed(2)}</div>
                            <div class="label">Prix Option</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">$${underlyingPrice.toFixed(2)}</div>
                            <div class="label">Prix Sous-jacent</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">$${option.strike}</div>
                            <div class="label">Strike</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.dte} jours</div>
                            <div class="label">Expiration</div>
                        </div>
                    </div>
                    
                    <div class="moneyness-indicator">
                        <div class="moneyness-dot ${moneynessClass}"></div>
                        <span><strong>Moneyness:</strong> ${moneyness}</span>
                    </div>
                </div>

                <div class="modal-section">
                    <h4 class="section-title">📈 Volume & Open Interest</h4>
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="value">${option.volume.toLocaleString()}</div>
                            <div class="label">Volume</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.open_interest.toLocaleString()}</div>
                            <div class="label">Open Interest</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${(option.volume / option.open_interest).toFixed(2)}</div>
                            <div class="label">Ratio V/OI</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.volume_anomaly_ratio ? (option.volume_anomaly_ratio * 100).toFixed(0) + 'x' : 'N/A'}</div>
                            <div class="label">Anomalie Volume</div>
                        </div>
                    </div>
                </div>

                <div class="modal-section">
                    <h4 class="section-title">🎯 Scores d'Analyse</h4>
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="value" style="color: #4299e1;">${option.hybrid_score.toFixed(1)}</div>
                            <div class="label">Score Hybride</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.realtime_score.toFixed(1)}</div>
                            <div class="label">Score Temps Réel</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.historical_score.toFixed(1)}</div>
                            <div class="label">Score Historique</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.greeks_quality}</div>
                            <div class="label">Qualité Greeks</div>
                        </div>
                    </div>
                </div>

                <div class="modal-section">
                    <h4 class="section-title">📊 Données Hybrides</h4>
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="value">${option.price_trend_30d || 'N/A'}</div>
                            <div class="label">Tendance 30j</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.volatility_regime || 'N/A'}</div>
                            <div class="label">Volatilité</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.data_freshness}</div>
                            <div class="label">Fraîcheur</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.polygon_enabled ? '✅' : '❌'}</div>
                            <div class="label">Polygon.io</div>
                        </div>
                    </div>
                </div>

                <div class="modal-section">
                    <h4 class="section-title">🔬 Greeks & IV</h4>
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="value">${option.delta ? option.delta.toFixed(3) : 'N/A'}</div>
                            <div class="label">DELTA</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.gamma ? option.gamma.toFixed(4) : 'N/A'}</div>
                            <div class="label">GAMMA</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.theta ? option.theta.toFixed(3) : 'N/A'}</div>
                            <div class="label">THETA</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.vega ? option.vega.toFixed(3) : 'N/A'}</div>
                            <div class="label">VEGA</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.implied_volatility ? (option.implied_volatility * 100).toFixed(1) + '%' : 'N/A'}</div>
                            <div class="label">IV</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${option.rho ? option.rho.toFixed(3) : 'N/A'}</div>
                            <div class="label">RHO</div>
                        </div>
                    </div>
                </div>

                <div class="modal-section">
                    <h4 class="section-title">💰 Prix & Spread</h4>
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="value">$${option.bid.toFixed(2)}</div>
                            <div class="label">Bid</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">$${option.ask.toFixed(2)}</div>
                            <div class="label">Ask</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">$${(option.ask - option.bid).toFixed(2)}</div>
                            <div class="label">Spread</div>
                        </div>
                        <div class="metric-card">
                            <div class="value">${(((option.ask - option.bid) / option.last) * 100).toFixed(1)}%</div>
                            <div class="label">Spread %</div>
                        </div>
                    </div>
                </div>
            `;

            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('option-modal').classList.remove('show');
        }

        // Fermer modal en cliquant à l'extérieur
        document.getElementById('option-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Fermer modal avec Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
