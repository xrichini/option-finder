name: Option Scan (GHA)

on:
  schedule:
    # Toutes les 30 min, lun-ven, 14h00–21h30 UTC (≈ 9h30–16h ET + marge)
    - cron: "*/30 14-21 * * 1-5"
  workflow_dispatch:
    inputs:
      universe:
        description: "Univers à scanner"
        required: false
        default: "nasdaq100"
        type: choice
        options:
          - nasdaq100
          - sp500
          - dow30
      force:
        description: "Forcer le scan même si marché fermé"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scan:
    name: Scan options
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour git push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historique complet pour pouvoir pousser

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          TRADIER_API_KEY_PRODUCTION: ${{ secrets.TRADIER_API_KEY_PRODUCTION }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          UNIVERSE="${{ github.event.inputs.universe || 'nasdaq100' }}"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          echo "📡 Scanning universe: $UNIVERSE (force=${{ github.event.inputs.force || 'false' }})"
          python scan_daemon.py --once --universe "$UNIVERSE" $FORCE_FLAG

      - name: Commit scan results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_scan.json
          git diff --staged --quiet && echo "Aucun changement — skip commit." || (
            git commit -m "chore: scan results $(date -u '+%Y-%m-%dT%H:%MZ')" &&
            git push
          )
