name: Option Scan (GHA)

on:
  schedule:
    # Toutes les 15 min, lun-ven, 14h00–21h30 UTC (≈ 9h30–16h ET + marge)
    # Docker optimization: ~1.5-2 min per scan, very safe within Tradier 120 req/min limit
    - cron: "*/15 14-21 * * 1-5"
  workflow_dispatch:
    inputs:
      universe:
        description: "Univers à scanner"
        required: false
        default: "nasdaq100"
        type: choice
        options:
          - nasdaq100
          - sp500
          - dow30
      force:
        description: "Forcer le scan même si marché fermé"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scan:
    name: Scan [${{ matrix.universe }}]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour git push
    strategy:
      matrix:
        universe: [nasdaq100, sp500, dow30]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historique complet pour pouvoir pousser

      - name: Build & Run scan with Docker
        env:
          TRADIER_API_KEY_PRODUCTION: ${{ secrets.TRADIER_API_KEY_PRODUCTION }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          UNIVERSE="${{ matrix.universe }}"
          OUTPUT_FILE="data/scan_${UNIVERSE}.json"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          echo "📡 Building Docker image & scanning universe: $UNIVERSE → $OUTPUT_FILE"
          
          # Build Docker image
          docker build -t option-finder:latest .
          
          # Run scan in Docker container
          docker run \
            --rm \
            -v "$(pwd)/data:/app/data" \
            -e TRADIER_API_KEY_PRODUCTION="$TRADIER_API_KEY_PRODUCTION" \
            -e FMP_API_KEY="$FMP_API_KEY" \
            -e POLYGON_API_KEY="$POLYGON_API_KEY" \
            option-finder:latest \
            python scan_daemon.py --once --universe "$UNIVERSE" --output "$OUTPUT_FILE" $FORCE_FLAG

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ matrix.universe }}
          path: |
            data/scan_${{ matrix.universe }}.json
            data/options_history.db
          retention-days: 1

  merge-and-deploy:
    name: Merge results & deploy
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scan-*
          path: artifacts/

      - name: Merge history DBs + scan results
        run: |
          python3 << 'EOF'
          import json, sqlite3, shutil
          from pathlib import Path
          from datetime import datetime

          # ── Merge options_history.db from all 3 universes ──────────────────
          base_db = Path("data/options_history.db")
          con = sqlite3.connect(str(base_db))
          cur = con.cursor()
          total_inserted = 0
          for universe in ["nasdaq100", "sp500", "dow30"]:
              src = Path(f"artifacts/scan-{universe}/data/options_history.db")
              if not src.exists():
                  print(f"⚠️  DB not found for {universe}: {src}")
                  continue
              cur.execute(f"ATTACH DATABASE '{src}' AS src_{universe}")
              cur.execute(f"""
                  INSERT OR REPLACE INTO option_history
                  (option_symbol, underlying, scan_date, volume_1d, open_interest,
                   last_price, whale_score, vol_oi_ratio, implied_volatility, strike,
                   option_type, volume_30d_avg, size_percentile, fill_velocity,
                   iv_52w_avg, order_flow_strength, volatility_smile_width)
                  SELECT option_symbol, underlying, scan_date, volume_1d, open_interest,
                         last_price, whale_score, vol_oi_ratio, implied_volatility, strike,
                         option_type, volume_30d_avg, size_percentile, fill_velocity,
                         iv_52w_avg, order_flow_strength, volatility_smile_width
                  FROM src_{universe}.option_history
              """)
              n = cur.rowcount
              total_inserted += n
              print(f"✅ Merged {n} rows from {universe} DB")
              cur.execute(f"DETACH DATABASE src_{universe}")
          con.commit()
          cur.execute("SELECT COUNT(*), COUNT(DISTINCT scan_date) FROM option_history")
          rows, days = cur.fetchone()
          con.close()
          print(f"📊 DB final: {rows} rows across {days} distinct scan dates (+{total_inserted} upserted)")

          # ── Merge scan JSON results ─────────────────────────────────────────
          merged = {
            "timestamp": datetime.now().isoformat(),
            "universes": ["nasdaq100", "sp500", "dow30"],
            "opportunities": []
          }

          for universe in ["nasdaq100", "sp500", "dow30"]:
            path = Path(f"artifacts/scan-{universe}/data/scan_{universe}.json")
            if path.exists():
              try:
                with open(path) as f:
                  data = json.load(f)
                  opps = data.get("opportunities", [])
                  for opp in opps:
                    opp["universe"] = universe
                  merged["opportunities"].extend(opps)
                  print(f"✅ Merged {len(opps)} from {universe}")
              except Exception as e:
                print(f"⚠️  Error merging {universe}: {e}")
            else:
              print(f"⚠️  File not found: {path}")
          
          # Sort by whale_score descending + remove duplicates
          seen = set()
          deduped = []
          for opp in sorted(merged["opportunities"], key=lambda x: x.get("whale_score", 0), reverse=True):
            sym = opp.get("option_symbol")
            if sym not in seen:
              seen.add(sym)
              deduped.append(opp)
          
          merged["opportunities"] = deduped
          total = len(deduped)
          print(f"📊 Total: {total} unique opportunities after dedup")

          # Guard: don't overwrite a good scan with empty results
          if total == 0:
            print("⚠️  0 opportunities — skipping write to preserve last good scan.")
            import sys; sys.exit(0)
          
          # Write merged results
          with open("data/latest_scan.json", "w") as f:
            json.dump(merged, f)
          print(f"✅ Merged results written to data/latest_scan.json")
          EOF

      - name: Commit merged results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_scan.json data/options_history.db
          git diff --staged --quiet || git commit -m "chore: merged scan results (nasdaq100+sp500+dow30) $(date -u '+%Y-%m-%dT%H:%MZ')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
